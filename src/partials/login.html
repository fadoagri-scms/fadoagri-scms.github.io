<div class="modal-overlay active" id="login-overlay">
    <div class="modal" style="max-width:380px;">
      <div class="modal-header">
        <div class="modal-title">Đăng nhập</div>
      </div>
      <div class="muted" style="font-size:12.5px;margin:-8px 0 16px;">FADO AGRI — Chuỗi cung ứng xuất khẩu</div>
      <form id="form-login">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="ban@fadoagri.com" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="login-password">Mật khẩu</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div id="login-error" style="font-size:12.5px;color:var(--red);min-height:16px;margin-bottom:10px;"></div>
        <div class="modal-actions" style="justify-content:stretch;">
          <button type="submit" class="btn-primary" id="btn-submit-login" style="width:100%;justify-content:center;">Đăng nhập</button>
        </div>
      </form>
    </div>
  </div>
